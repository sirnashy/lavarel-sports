version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sportstream-app
    container_name: sportstream-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: sportstream-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: sports_streaming
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_USER: sports_user
      MYSQL_PASSWORD: sports_password_here
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: sportstream-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sportstream-queue
    restart: unless-stopped
    command: /usr/local/bin/php /var/www/html/artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis

volumes:
  dbdata:
  redisdata:
